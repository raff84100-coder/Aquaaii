<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaChat AI</title>
    <style>
        /* CSS: Mengatur Tampilan Sesuai Video */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .logo-circle { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: conic-gradient(#ff00e6, #00dbde, #fc00ff, #ff00e6); 
            display: flex; justify-content: center; align-items: center; 
            font-size: 35px; font-weight: bold; color: white; border: 2.5px solid #000; margin: 0 auto;
        }
        .menu-btn { background: none; border: none; font-size: 30px; cursor: pointer; position: absolute; left: 20px; }

        .screen { flex: 1; display: none; flex-direction: column; overflow: hidden; height: 100%; }
        .active { display: flex; }

        #chatArea { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .ai { background: #f1f1f1; align-self: flex-start; border-bottom-left-radius: 4px; color: #000; }
        .user { background: #000; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-bar { padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; background: #fff; }
        .btn-plus { width: 40px; height: 40px; background: #333; color: white; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .input-box { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; background: #f1f1f1; font-size: 16px; }
        .send-btn { border: none; background: none; font-size: 28px; transform: rotate(-45deg); cursor: pointer; color: #000; }

        .settings-content { padding: 30px; }
        .settings-content h2 { font-size: 20px; margin-bottom: 25px; font-weight: normal; }
        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; font-size: 14px; color: #333; margin-bottom: 8px; }
        .setting-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #e0e0e0; font-size: 14px; outline: none; }
        .save-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        #status { font-size: 12px; color: #999; text-align: center; margin-bottom: 8px; display: none; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <button class="menu-btn" onclick="toggleScreen('settings')">☰</button>
        <div class="logo-circle">A</div>
    </div>

    <div id="chat-screen" class="screen active">
        <div id="chatArea">
            <div class="bubble ai">Halo! Silakan masukkan API Key di menu pengaturan (☰) untuk mulai mengobrol.</div>
        </div>
        <div id="status">Aqua sedang berpikir...</div>
        <div class="input-bar">
            <button class="btn-plus">+</button>
            <input type="text" id="userInput" class="input-box" placeholder="ask aquachat" autocomplete="off">
            <button class="send-btn" onclick="askGemini()">➤</button>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="settings-content">
            <h2>pengaturan</h2>
            <div class="setting-item">
                <label>key API</label>
                <input type="password" id="apiKeyInput" class="setting-input" placeholder="Tempel API Key Gemini">
            </div>
            <div class="setting-item">
                <label>memori</label>
                <input type="text" class="setting-input" value="Aktif" disabled>
            </div>
            <button class="save-btn" onclick="saveSettings()">Simpan & Kembali</button>
            <p style="text-align: center; margin-top: 40px; color: #bbb; font-style: italic; font-size: 13px;">With Aqua, become lifestyle</p>
        </div>
    </div>

    <script>
        // Memuat API Key yang tersimpan
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        };

        function toggleScreen(screen) {
            document.getElementById('chat-screen').style.display = (screen === 'chat') ? 'flex' : 'none';
            document.getElementById('settings-screen').style.display = (screen === 'settings') ? 'flex' : 'none';
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) return alert("API Key tidak boleh kosong!");
            localStorage.setItem('gemini_key', key);
            alert("Pengaturan Berhasil Disimpan!");
            toggleScreen('chat');
        }

        function addBubble(text, sender) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.innerText = text;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

                async function askGemini() {
            const key = localStorage.getItem('gemini_key');
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if (!prompt) return;
            if (!key) return (alert("Isi API Key di pengaturan dulu!"), toggleScreen('settings'));

            addBubble(prompt, 'user');
            input.value = "";
            document.getElementById('status').style.display = "block";

            try {
                // Alamat API yang lebih stabil
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // Jika ada error dari Google, tampilkan alasannya
                    addBubble("Google bilang: " + data.error.message, 'ai');
                    console.error(data.error);
                } else if (data.candidates && data.candidates[0].content) {
                    addBubble(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    addBubble("Aqua menerima respon kosong. Cek API Key kamu.", 'ai');
                }
            } catch (e) {
                addBubble("Gagal koneksi. Periksa internet atau blokir browser.", 'ai');
            } finally {
                document.getElementById('status').style.display = "none";
            }
        }


        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') askGemini(); });
    </script>
</body>
</html>
